# Analyzer configuration. Hardened per TODO T9: strict language modes plus
# async-correctness lints — the app's core value is async DB/backup integrity,
# so unawaited/discarded futures are treated as errors, not style.
# CI (`flutter analyze`) fails on any info-level issue.

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  exclude:
    # Generated code (build_runner, gen_supplements, gen-l10n).
    - "**/*.g.dart"
    - lib/l10n/app_localizations*.dart

linter:
  rules:
    - unawaited_futures
    - discarded_futures
    - prefer_final_locals
    - directives_ordering
    # avoid_slow_async_io is deliberately NOT enabled: T5 moved backup/FS work
    # to async dart:io on purpose (sync IO on the UI isolate janks frames);
    # the lint would flag exactly those call sites and invite regressions.
