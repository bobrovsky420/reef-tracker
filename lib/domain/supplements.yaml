# Supplement catalog — SOURCE OF TRUTH for the dosing feature.
#
# After editing this file, regenerate the Dart catalog with:
#     dart run tool/gen_supplements.dart
# (the generator validates this file and writes supplement_catalog.g.dart).
#
# Notes:
#  - Brand / program / product names are proper nouns and are NOT localized.
#  - `key` is a STABLE identifier persisted on dosing entries — never rename or
#    reuse a key, or stored entries (and the future dose log) lose their link.
#  - `element` is a real reef-parameter key (alkalinity, calcium, magnesium,
#    potassium, strontium, iodine, iron, nitrate, phosphate). Omit for trace /
#    multi-element products.
#  - `unit` is the default dose unit: `ml` (default, may be omitted) or `g`.
#  - `strength` is the potency map for the future consumption calculator:
#    { paramKey: amount of that element delivered per ONE unit (ml/g) of product
#    per ONE litre of tank water, in the parameter's canonical unit }.
#    LEAVE IT OUT until verified against the vendor's own dosing chart — a wrong
#    value silently corrupts later consumption estimates. Cite the source in a
#    comment when you add one.

vendors:
  - key: redsea
    name: Red Sea
    products:
      - key: redsea.no3po4x
        name: "NO₃:PO₄-X (nutrient reducer)"
    programs:
      - key: foundation_abc
        name: Foundation ABC
        # strength = element rise per 1 ml of product per 1 L of tank, from
        # Red Sea's Foundation / Trace Colors dosing charts (1 ml / 100 L raises):
        #  - Foundation A:  Ca +2 ppm     → 2 * 100 / 1
        #  - Foundation B:  KH +0.1 dKH   → 0.1 * 100 / 1
        #  - Foundation C:  Mg +1 ppm     → 1 * 100 / 1
        #  - Trace Colors A: Iodine +0.03 ppm    → 0.03 * 100 / 1
        #  - Trace Colors B: Potassium +1.75 ppm → 1.75 * 100 / 1
        #  - Trace Colors C: Iron +0.01 ppm      → 0.01 * 100 / 1
        products:
          - key: redsea.foundation_a
            name: Foundation A — Calcium
            element: calcium
            strength: { calcium: 200.0 }
          - key: redsea.foundation_b
            name: Foundation B — KH/Alkalinity
            element: alkalinity
            strength: { alkalinity: 10.0 }
          - key: redsea.foundation_c
            name: Foundation C — Magnesium
            element: magnesium
            strength: { magnesium: 100.0 }
          - key: redsea.colors_a
            name: Trace Colors A — Iodine
            element: iodine
            strength: { iodine: 3.0 }
          - key: redsea.colors_b
            name: Trace Colors B — Potassium
            element: potassium
            strength: { potassium: 175.0 }
          - key: redsea.colors_c
            name: Trace Colors C — Iron
            element: iron
            strength: { iron: 1.0 }
          - key: redsea.colors_d
            name: Trace Colors D — Bioactive Elements
      - key: complete_reef_care
        name: Complete Reef Care Program
        # strength = element rise per 1 ml of product per 1 L of tank, from
        # Red Sea's Complete Reef Care dosing instructions (model R22755):
        #  - Part #1: 1 ml / 100 L raises Ca +1.4 ppm → 1.4 * 100 / 1
        #  - Part #2: 1 ml / 100 L raises KH +0.1 dKH → 0.1 * 100 / 1
        products:
          - key: redsea.complete_1
            name: Part 1 — Calcium & Magnesium
            element: calcium
            strength: { calcium: 140.0 }
          - key: redsea.complete_2
            name: Part 2 — KH/Alkalinity & pH Stabilizer
            element: alkalinity
            strength: { alkalinity: 10.0 }
          - key: redsea.complete_3
            name: Part 3 — Iodine & Potassium
          - key: redsea.complete_4
            name: Part 4 — Iron & Bioactive Elements

  - key: tropicmarin
    name: Tropic Marin
    products:
      - key: tropicmarin.all_for_reef
        name: All-For-Reef
    programs:
      - key: balling
        name: Balling
        # strength = element rise per 1 ml of stock per 1 L of tank, from the
        # Tropic Marin Balling dosing chart's "Concentration of solution" (the
        # element content per 1 L of made-up stock) → value / 1000:
        #  - Part A: 20000 mg/L Ca         → 20.0
        #  - Part B: 2800 °dH/L (= dKH)    → 2.8
        #  - Part C: ~3350 mg/L Mg, ~980 mg/L K → 3.35 / 0.98
        products:
          - key: tropicmarin.balling_a
            name: Part A — Calcium
            element: calcium
            strength: { calcium: 20.0 }
          - key: tropicmarin.balling_b
            name: Part B — Carbonate (Alk)
            element: alkalinity
            strength: { alkalinity: 2.8 }
          - key: tropicmarin.balling_c
            name: Part C — Trace/Mg
            element: magnesium
            strength: { magnesium: 3.35, potassium: 0.98 }

  - key: triton
    name: Triton
    programs:
      - key: core7
        name: Core7 Base Elementz
        # No `strength` / `element`: Triton deliberately does NOT publish the
        # Core7 concentrations (they steer users to ICP tests + their own
        # calculator). The only figures online are third-party "educated
        # guesses" (e.g. BeanAnimal's calculator), which the verified-only rule
        # above rules out — a wrong value would silently corrupt consumption
        # estimates. Leave these out until Triton publishes an official chart.
        products:
          - key: triton.core7_1
            name: "Base Elementz #1"
          - key: triton.core7_2
            name: "Base Elementz #2"
          - key: triton.core7_3
            name: "Base Elementz #3"
          - key: triton.core7_4
            name: "Base Elementz #4"

  - key: faunamarin
    name: Fauna Marin
    programs:
      - key: elementals_trace
        name: Elementals Trace
        # Single-element trace solutions, one bottle per element. Line-up from
        # https://www.faunamarin.de/en/category/products/water-treatment/
        # (15 products: Ba Co Cr Cu Fe I Li Mn Mo Ni Rb S Se V Zn).
        #
        # strength = element rise (mg/L, the canonical unit even for µg/L-
        # displayed traces) per 1 ml of product per 1 L of tank. Sources:
        #  - Fauna Marin "ELEMENTALS | TRACE — HOW TO USE" PDF (Ba Co Cr Fe I
        #    Li Mn Mo Ni V Zn): per 1 ml / 100 L — Ba +0.5 µg/l (10 ml → +5),
        #    Co +4, Cr +0.5, Fe +4, I +10, Li +15, Mn +4, Mo +6, Ni +4, V +5,
        #    Zn +10 µg/l → µg-value * 100 / 1000.
        #  - Shop pages for the newer Se (+0.5 µg/l per 1 ml / 100 L),
        #    S (10 ml / 100 L → S +7 mg/l and Mg +5 mg/l) and Rb (+5 µg/l per
        #    1 ml / 100 L; the app has no rubidium parameter → no mapping).
        #  - Cu publishes no per-ml figure ("dosage per ICP analysis") → no
        #    strength (verified-only rule).
        products:
          - key: faunamarin.trace_ba
            name: Elementals Trace Ba — Barium
            element: barium
            strength: { barium: 0.05 }
          - key: faunamarin.trace_co
            name: Elementals Trace Co — Cobalt
            element: cobalt
            strength: { cobalt: 0.4 }
          - key: faunamarin.trace_cr
            name: Elementals Trace Cr — Chromium
            element: chromium
            strength: { chromium: 0.05 }
          - key: faunamarin.trace_cu
            name: Elementals Trace Cu — Copper
            element: copper
          - key: faunamarin.trace_fe
            name: Elementals Trace Fe — Iron
            element: iron
            strength: { iron: 0.4 }
          - key: faunamarin.trace_i
            name: Elementals Trace I — Iodine
            element: iodine
            strength: { iodine: 1.0 }
          - key: faunamarin.trace_li
            name: Elementals Trace Li — Lithium
            element: lithium
            strength: { lithium: 1.5 }
          - key: faunamarin.trace_mn
            name: Elementals Trace Mn — Manganese
            element: manganese
            strength: { manganese: 0.4 }
          - key: faunamarin.trace_mo
            name: Elementals Trace Mo — Molybdenum
            element: molybdenum
            strength: { molybdenum: 0.6 }
          - key: faunamarin.trace_ni
            name: Elementals Trace Ni — Nickel
            element: nickel
            strength: { nickel: 0.4 }
          - key: faunamarin.trace_rb
            name: Elementals Trace Rb — Rubidium
          - key: faunamarin.trace_s
            name: Elementals Trace S — Sulfur
            element: sulfur
            strength: { sulfur: 70.0, magnesium: 50.0 }
          - key: faunamarin.trace_se
            name: Elementals Trace Se — Selenium
            element: selenium
            strength: { selenium: 0.05 }
          - key: faunamarin.trace_v
            name: Elementals Trace V — Vanadium
            element: vanadium
            strength: { vanadium: 0.5 }
          - key: faunamarin.trace_zn
            name: Elementals Trace Zn — Zinc
            element: zinc
            strength: { zinc: 1.0 }
      - key: balling_light
        name: Balling Light
        # Components of the Balling Light Set:
        # https://www.faunamarin.de/en/balling-light-set/
        # The three Balling Trace bottles are mixed INTO the Ca/KH/Mg stock
        # solutions, never dosed standalone, so they are not listed as products.
        # Salts are dissolved into stock solution and dosed in ml (default unit).
        #
        # strength = element rise per 1 ml of stock per 1 L of tank, derived from
        # the Fauna Marin Balling Light dosing chart (10 ml / 100 L raises:
        # Ca +11 mg/L, KH +0.5 dKH, Mg +5 mg/L) → rise * 100 / 10.
        products:
          - key: faunamarin.bl_calcium
            name: Calcium Mix
            element: calcium
            strength: { calcium: 110.0 }
          - key: faunamarin.bl_carbonate
            name: Carbonate Mix
            element: alkalinity
            strength: { alkalinity: 5.0 }
          - key: faunamarin.bl_magnesium
            name: Magnesium Mix
            element: magnesium
            strength: { magnesium: 50.0 }

  - key: aquaforest
    name: Aquaforest
    programs:
      - key: component_123
        name: Component 1·2·3
        # strength = element rise per 1 ml of product per 1 L of tank, from
        # Aquaforest's Component 1·2·3+ dosing chart (25 ml / 100 L raises):
        #  - Component 1+: Ca +4.5 ppm   → 4.5 * 100 / 25
        #  - Component 2+: KH +0.65 dKH  → 0.65 * 100 / 25
        #  - Component 3+: Mg +0.38 ppm  → 0.38 * 100 / 25
        products:
          - key: aquaforest.component_1
            name: Component 1+ (Ca)
            element: calcium
            strength: { calcium: 18.0 }
          - key: aquaforest.component_2
            name: Component 2+ (KH)
            element: alkalinity
            strength: { alkalinity: 2.6 }
          - key: aquaforest.component_3
            name: Component 3+ (Mg)
            element: magnesium
            strength: { magnesium: 1.52 }

  - key: ati
    name: ATI
    # https://atiaquaristik.com/en/essentials/
    products:
      # Daily Traces are broad multi-trace mixes (A: Cr/Co/Fe/Cu/Mn/Ni/Zn,
      # B: F/I/Se) — no single element, no published per-element chart.
      - key: ati.daily_traces_a
        name: "Essential Daily Traces #A"
      - key: ati.daily_traces_b
        name: "Essential Daily Traces #B"
      # ICP Element Iodine: ATI's shop page states 1 ml / 100 L raises iodine
      # by 10 µg/l (= 0.01 ppm) → 1.0; cross-checked against the stated bottle
      # content (1,000,000 µg per 1000 ml = 1 mg per ml).
      - key: ati.icp_iodine
        name: ICP Element Iodine
        element: iodine
        strength: { iodine: 1.0 }
    programs:
      - key: essentials_mixed_reef
        name: Essentials Mixed Reef
        # Two-part system, dose equal volumes (guideline 3-7 ml / 100 L / day).
        # strength from ATI's stated bottle concentrations:
        #  - #1: 38,500 °dKH per 2700 ml (14,250 °dKH/L) → 14.25
        #  - #2: 270,000 mg Ca per 2700 ml (100,000 mg Ca/L) → 100.0
        products:
          - key: ati.mixed_reef_1
            name: "#1 KH Complex"
            element: alkalinity
            strength: { alkalinity: 14.25 }
          - key: ati.mixed_reef_2
            name: "#2 Calcium Complex"
            element: calcium
            strength: { calcium: 100.0 }
      - key: essentials_sps
        name: Essentials SPS
        # Two-part system, dose equal volumes (guideline 5-10 ml / 100 L / day).
        # strength from ATI's stated bottle concentrations:
        #  - #1: 27,000 °dKH per 2700 ml (10,000 °dKH/L) → 10.0
        #    (matches ATI's chart: 1 ml / 100 L raises KH +0.1 °dKH)
        #  - #2: 200,000 mg Ca per 2700 ml (74,000 mg Ca/L) → 74.0
        products:
          - key: ati.sps_1
            name: "#1 KH Complex"
            element: alkalinity
            strength: { alkalinity: 10.0 }
          - key: ati.sps_2
            name: "#2 Calcium Complex"
            element: calcium
            strength: { calcium: 74.0 }

  - key: generic
    name: Generic / DIY
    products:
      - key: generic.kalkwasser
        name: Kalkwasser (limewater)
        element: calcium
      - key: generic.calcium_chloride
        name: Calcium chloride (2-part Ca)
        element: calcium
      - key: generic.soda_ash
        name: Soda ash / bicarbonate (2-part Alk)
        element: alkalinity
      - key: generic.magnesium_mix
        name: Magnesium mix (2-part Mg)
        element: magnesium
      - key: generic.dry_salt
        name: Dry salt / powder
        unit: g
