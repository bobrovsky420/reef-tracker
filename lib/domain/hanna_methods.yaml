# The Hanna checker method registry (U33) — source of truth for the numeric
# measurement-method codes the HI97115C "Marine Master" photometer offers and
# which catalog parameter each reading lands on.
#
# Edit this file, then regenerate:
#     dart run tool/gen_hanna_methods.dart
#
# Each entry:
#   code:     the meter's numeric method code — the stable identifier the
#             protocol uses (`set setup method,<code>`, field 2 of every
#             measurement frame). Persisted inside `hanna_method_sets`
#             settings values — never reuse a code for a different analyte.
#   param:    the catalog parameter key (parameters.yaml) the reading is
#             stored under. Range variants are distinct codes but the SAME
#             analyte — the code is provenance only (the U32 rule: map on
#             method, never on value/unit).
#   lowRange: true marks a low-range chemistry, shown with a low-range tag in
#             the method picker. A parameter may have both a standard and a
#             low-range code (nitrate) or only a low-range one (nitrite —
#             `Nitrite Marine LR` is the meter's only nitrite method).
#             Defaults to false.
#   factor:   multiplier from the meter's reported value to the catalog's
#             canonical unit. Defaults to 1 (most methods already report
#             canonical ppm/dKH/pH); nitrite LR reports ppb → 0.001 to ppm.
#
# Entry order = display order in the method picker. All nine codes
# user-confirmed 2026-07-21 (HANNA.md §3); further firmware chemistry
# variants would appear as new 20xx codes pointing at existing parameters.

methods:
  - code: 2097
    param: ph
  - code: 2002
    param: alkalinity
  - code: 2099
    param: ammonia
  - code: 2011
    param: calcium
  - code: 2098
    param: magnesium
  - code: 2095
    param: nitrate
  - code: 2096
    param: nitrate
    lowRange: true
  - code: 2057
    param: nitrite
    lowRange: true
    factor: 0.001
  - code: 2069
    param: phosphate

# The Hanna Lab CSV import mapping (U32) — how the `Method` column of a Hanna
# Lab export resolves to a catalog parameter, and which unit each row must
# carry (a mismatch is skipped, never converted — no guessing, same policy as
# the ZIMS unit handling). Generated into `kHannaCsvMethods`
# (`hanna_import.g.dart`) by the same `tool/gen_hanna_methods.dart` run.
#
# Each entry:
#   prefix: lowercase leading keyword of the `Method` label — prefix-matched
#           so range variants (`Nitrate Marine HR`/`LR`, `Phosphate Marine
#           ULR`/`HR`) all map. Entry order = match order; an earlier prefix
#           must not shadow a later one (`phosphate` before `ph` — validated).
#   param:  the catalog parameter key the reading lands on. Values are
#           already canonical (ppm / dKH / pH); mapping is on `Method`, never
#           on `Unit`.
#   unit:   required lowercase leading keyword of the row's `Unit` column,
#           prefix-matched (`ppm PO₄³⁻` → `ppm`) so the Unicode ion tail —
#           whose encoding depends on how the file traveled — never matters.
#   factor: multiplier from the file's value to the catalog's canonical unit.
#           Defaults to 1 (most rows are already canonical ppm/dKH/pH);
#           nitrite LR exports ppb → 0.001 to ppm.

csv:
  - prefix: alkalinity
    param: alkalinity
    unit: dkh
  - prefix: calcium
    param: calcium
    unit: ppm
  - prefix: magnesium
    param: magnesium
    unit: ppm
  - prefix: nitrate
    param: nitrate
    unit: ppm
  - prefix: nitrite
    param: nitrite
    unit: ppb
    factor: 0.001
  - prefix: phosphate
    param: phosphate
    unit: ppm
  - prefix: ammonia
    param: ammonia
    unit: ppm
  - prefix: ph
    param: ph
    unit: ph

# The pocket-checker registry (U34 — checker camera scan) — which Checker HC
# models the camera scan supports. Generated into `kHannaCheckers`
# (`hanna_checker.g.dart`) by the same `tool/gen_hanna_methods.dart` run.
# Specs verified against hannainst.com product pages + manuals 2026-07-21.
#
# Each entry:
#   model:    the Hanna model number (HIxxx) — the stable identifier.
#   param:    the catalog parameter key the reading lands on.
#   tag:      optional range/variant label shown after the parameter name
#             (ULR/LR/HR, or the unit for the two alkalinity flavors).
#             Required when a parameter has several models.
#   unit:     the unit printed on the checker face — what the LCD number
#             means (ppm/ppb/dKH/pH), shown verbatim in the confirm UI.
#   decimals: digits after the decimal point on the LCD (display
#             resolution). Doubles as decode validation: a scan whose
#             decimal position differs is a misread and is rejected.
#   min/max:  the display range in display units — same validation role.
#   factor:   multiplier from the displayed value to the catalog's
#             canonical unit. Defaults to 1. Non-trivial conversions:
#             HI755 ppm CaCO3 → dKH (×0.056, = 2.8/50), HI736 ppb P →
#             ppm PO4 (×0.003066, Hanna's ×3.066 P→PO4 over ppb→ppm),
#             nitrite checkers ppb NO2-N → canonical ppm (×0.001, same
#             convention as the HI97115C's nitrite LR method above).
#
# Entry order = display order in the model picker (catalog parameter order,
# range variants from lowest to highest range).

checkers:
  - model: HI780
    param: ph
    unit: pH
    decimals: 1
    min: 6.3
    max: 8.6
  - model: HI772
    param: alkalinity
    tag: dKH
    unit: dKH
    decimals: 1
    min: 0
    max: 20
  - model: HI755
    param: alkalinity
    tag: ppm
    unit: ppm
    decimals: 0
    min: 0
    max: 300
    factor: 0.056
  - model: HI784
    param: ammonia
    unit: ppm
    decimals: 2
    min: 0
    max: 2.5
  - model: HI758
    param: calcium
    unit: ppm
    decimals: 0
    min: 200
    max: 600
  - model: HI783
    param: magnesium
    unit: ppm
    decimals: 0
    min: 1000
    max: 1800
  - model: HI781
    param: nitrate
    tag: LR
    unit: ppm
    decimals: 2
    min: 0
    max: 5
  - model: HI782
    param: nitrate
    tag: HR
    unit: ppm
    decimals: 1
    min: 0
    max: 75
  - model: HI764
    param: nitrite
    tag: ULR
    unit: ppb
    decimals: 0
    min: 0
    max: 200
    factor: 0.001
  - model: HI767
    param: nitrite
    tag: LR
    unit: ppb
    decimals: 0
    min: 0
    max: 999
    factor: 0.001
  - model: HI707
    param: nitrite
    tag: LR fresh
    unit: ppb
    decimals: 0
    min: 0
    max: 600
    factor: 0.001
  - model: HI774
    param: phosphate
    tag: ULR
    unit: ppm
    decimals: 2
    min: 0
    max: 0.9
  - model: HI713
    param: phosphate
    tag: LR
    unit: ppm
    decimals: 2
    min: 0
    max: 2.5
  - model: HI736
    param: phosphate
    tag: P ULR
    unit: ppb
    decimals: 0
    min: 0
    max: 200
    factor: 0.003066
