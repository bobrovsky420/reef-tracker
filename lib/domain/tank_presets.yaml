# Recommended zone bounds of the dashboard ratio cards, keyed by `RatioKind`
# enum name, in the *displayed* metric space (the value the chart plots):
#  - po4no3: N of `1 : N` = NO₃ ÷ PO₄. A ~100:1 NO₃:PO₄ "Redfield-style"
#    target is widely recommended; lopsided ratios feed cyano/dinos.
#  - mgca: Mg ÷ Ca — ≈3:1, natural seawater ≈3.1.
#  - caalk: Ca (ppm) ÷ Alk (dKH). Ca and carbonate alkalinity are consumed
#    together when corals build CaCO₃, so this flags dosing imbalance.
#    NSW ≈ 412 / 7.0 ≈ 59; balanced reef setups (Ca 420–450, Alk 8–9) land
#    ≈ 48–56. Extremes hint that one is being dosed out of step.
#  - mgalk: Mg (ppm) ÷ Alk (dKH). Magnesium keeps Ca and alkalinity in
#    solution; a low value hints at why both are hard to hold. NSW ≈
#    1280 / 7.0 ≈ 183; reef setups (Mg 1300–1400, Alk 8–9) land ≈ 155–185.
# All four bounds are required and strictly ascending; used to color the
# cards and draw the graph zone bands. Editable per tank like all bounds.
ratios:
  po4no3: { amberLow: 25, greenLow: 50, greenHigh: 150, amberHigh: 250 }
  mgca: { amberLow: 2.6, greenLow: 2.9, greenHigh: 3.3, amberHigh: 3.6 }
  caalk: { amberLow: 40, greenLow: 46, greenHigh: 62, amberHigh: 70 }
  mgalk: { amberLow: 135, greenLow: 150, greenHigh: 190, amberHigh: 210 }
