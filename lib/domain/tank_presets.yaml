# Tank presets — SOURCE OF TRUTH for the default zone bounds (and correction
# targets) each tank setup type starts with, plus the recommended zone bounds
# of the dashboard ratio cards.
#
# After editing this file, regenerate the Dart data with:
#     dart run tool/gen_tank_presets.dart
# (the generator validates this file against parameters.yaml and writes
# presets.g.dart + ratio.g.dart).
#
# Notes:
#  - Every `SetupType` enum value (fishOnly, soft, lps, sps, mixed) must have
#    a section; the generator mirrors the enum names and rejects unknowns.
#  - The parameters LISTED under a setup type are the ones tracked by default
#    for that type (everything else can be added manually later); the listing
#    ORDER is the seeding order (`defaultTrackedKeys`).
#  - Every key must be a CORE parameter from parameters.yaml — microelement
#    defaults live there (per-element `defaultBounds`), not here.
#  - Bounds are in the CANONICAL unit (°C, SG, dKH, ppm) and are sensible
#    starting points — every bound is editable per tank. `greenLow`/
#    `greenHigh` are required; the amber pair is optional ("never red on
#    that side" when omitted, e.g. there is no "too little ammonia").
#    Present bounds must be ascending and inside the parameter's plausible
#    range.
#  - `target` = the default correction target the dose calculator's
#    correction mode aims for, in the canonical unit. Define it only where
#    the sensible target is NOT simply the middle of the green zone
#    (currently alkalinity, whose wide safe band sits above the commonly
#    recommended set point); every other parameter falls back to the
#    green-zone midpoint at use time. Must lie inside the green range.
#    Seeded into `TrackedParameters.targetValue` (editable per tank).

