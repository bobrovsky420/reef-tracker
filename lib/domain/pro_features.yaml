# The Pro feature registry (U19) — source of truth for which features sit
# behind the future paid tier and which of them early adopters keep for free.
#
# Edit this file, then regenerate:
#     dart run tool/gen_pro_features.dart
#
# Each entry:
#   key:           camelCase Dart identifier — becomes a `ProFeature` enum value.
#                  Keys are never persisted anywhere (entitlement state is the
#                  `legacy_free_since` marker + the future purchase), so they
#                  can be renamed freely.
#   grandfathered: true  = the feature existed at the monetization cutoff and
#                          stays free FOREVER for Founder's Edition installs.
#                          NEVER flip true -> false — that breaks the public
#                          promise (test/pro_features_test.dart pins the set).
#                  false = built after the cutoff; paid for everyone once the
#                          Pro tier exists.
#
# Retiering a feature (free -> Pro) = adding an entry here + gating its UI
# surfaces with `proFeatureProvider`; git history is the audit trail.

features:
  - key: icpImport
    grandfathered: true
  - key: doseCalculator
    grandfathered: true
  - key: unlimitedTanks
    grandfathered: true
  - key: stabilityScore
    grandfathered: true
  - key: driveSync
    grandfathered: true
  - key: smartInsights
    grandfathered: true
  # U32 Hanna Lab measurement import — grandfathered by explicit 2026-07-19
  # decision (same reasoning as driveSync/stabilityScore/smartInsights:
  # usable immediately, Founder installs keep it free forever).
  - key: hannaImport
    grandfathered: true
  # U33 Hanna checker direct BLE connection (experimental) — grandfathered
  # per the 2026-07-21 decision, consistent with hannaImport (the same
  # meter's file-based sibling path).
  - key: hannaConnect
    grandfathered: true
  # U34 checker camera scan (experimental) — grandfathered per the
  # 2026-07-21 decision, consistent with hannaConnect/hannaImport (the
  # third acquisition path for the same Hanna readings).
  - key: hannaScan
    grandfathered: true
  # U36 ReefFactory local-device live values (experimental) — grandfathered,
  # consistent with the other device-integration paths (hannaConnect/Scan):
  # usable immediately, Founder installs keep it free forever.
  - key: reefFactory
    grandfathered: true
