    displayFactor: 1000
    minValue: 0
    plausibleMin: 0
    plausibleMax: 1
    defaultBounds: { greenHigh: 0.001, amberHigh: 0.004 }

  - key: lithium
    unit: "µg/L"
    decimals: 0
    category: trace
    symbol: Li
    displayFactor: 1000
    minValue: 0
    plausibleMin: 0
    plausibleMax: 5
    defaultBounds: { amberLow: 0.05, greenLow: 0.12, greenHigh: 0.25, amberHigh: 0.4 }

  - key: barium
    unit: "µg/L"
    decimals: 1
    category: trace
    symbol: Ba
    displayFactor: 1000
    minValue: 0
    plausibleMin: 0
    plausibleMax: 1
