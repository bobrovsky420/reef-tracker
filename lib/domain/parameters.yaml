# Parameter catalog — SOURCE OF TRUTH for every trackable water parameter
# (core dashboard set + the ICP microelement panel).
#
# After editing this file, regenerate the Dart catalog with:
#     dart run tool/gen_parameters.dart
# (the generator validates this file and writes parameter_catalog.g.dart).
#
# Notes:
#  - `key` is a STABLE identifier persisted in the database (readings,
#    tracked-parameter rows, dosing entries) — never rename or reuse a key.
#  - Catalog ORDER matters: it is the display order of the micro panel and
#    the fallback order elsewhere.
#  - `unit` is the display unit label. Editable per tank for core parameters;
#    FIXED for microelements (category other than core), where it must be the
#    unit printed on an ICP report: mg/L or µg/L.
#  - `decimals` = display precision (0–4).
#  - `category`: core (dashboard; the default when omitted), major, trace or
#    contaminant (the latter three = the Microelements screen, U17).
#  - `group` = the fixed dashboard section a core parameter renders in
#    (REDESIGN #6): core, nutrients or environment. REQUIRED for core
#    parameters, forbidden for microelements.
#  - `symbol` = chemical element symbol ("Zn"), REQUIRED for microelements so
#    rows match an ICP report; omit for core parameters.
#  - `displayFactor` = canonical→display multiplier (default 1). Storage stays
#    canonical ppm (mg/L) for every concentration; µg/L elements display
#    through factor 1000.
#  - `minValue` / `plausibleMin` / `plausibleMax` are in the CANONICAL unit:
#    minValue = hard physical floor (reject below), the plausible pair = the
#    generous range outside which a value needs explicit confirmation (#31).
#    Define both plausible bounds or neither.
#  - `importance` = relative weight in the health/stability aggregates
#    (default 1; parameters whose swings harm livestock fastest weigh most).
#    Core-only — microelements are excluded from both scores.
#  - `maxDailyRise` = maximum safe correction rise per day in the CANONICAL
#    unit; the dose calculator splits a correction that would rise faster.
#    Omit = no established limit, the correction applies in one dose.
#  - `defaultBounds` = default zone bounds (amberLow/greenLow/greenHigh/
#    amberHigh) in the CANONICAL unit — REQUIRED for microelements (the
#    fallback when a tank has no TrackedParameters row for the element, and
#    the seed when one is created), FORBIDDEN for core parameters (their
#    defaults are per-setup-type presets in presets.dart). One-sided "keep
#    low" elements omit the low pair (no "too little lead"); an amber bound
#    requires its green partner, present bounds must be ascending and inside
#    the plausible range.

parameters:
  # --- Core dashboard parameters -------------------------------------------
  - key: temperature
    unit: "°C"
    decimals: 1
    group: environment
    importance: 3
    minValue: 0
    plausibleMin: 10
    plausibleMax: 40

  - key: ph
    unit: pH
    decimals: 2
    group: environment
    importance: 2.5
    minValue: 0
    plausibleMin: 5
    plausibleMax: 10

  - key: salinity
    unit: SG
    decimals: 3
    group: environment
    importance: 3
    minValue: 1.0
    plausibleMin: 1.0
    plausibleMax: 1.05

  - key: alkalinity
    unit: dKH
    decimals: 1
    group: core
    importance: 3
    maxDailyRise: 1.4
    minValue: 0
    plausibleMin: 0
    plausibleMax: 30

  - key: calcium
    unit: ppm
    decimals: 0
    group: core
    importance: 2
    maxDailyRise: 50
    minValue: 0
    plausibleMin: 100
    plausibleMax: 1000

  - key: magnesium
    unit: ppm
    decimals: 0
    group: core
    importance: 2
    maxDailyRise: 100
    minValue: 0
    plausibleMin: 800
    plausibleMax: 2000

  - key: nitrate
    unit: ppm
    decimals: 1
    group: nutrients
    importance: 2
    minValue: 0
    plausibleMin: 0
    plausibleMax: 250

  - key: phosphate
    unit: ppm
    decimals: 2
    group: nutrients
    importance: 2
    minValue: 0
    plausibleMin: 0
    plausibleMax: 5

  - key: ammonia
    unit: ppm
    decimals: 2
    group: nutrients
    importance: 3
    minValue: 0
    plausibleMin: 0
    plausibleMax: 10

  - key: nitrite
    unit: ppm
    decimals: 2
    group: nutrients
    importance: 3
    minValue: 0
    plausibleMin: 0
    plausibleMax: 10

  # ORP can dip below zero in anoxic conditions — no hard floor.
  - key: orp
    unit: mV
    decimals: 0
    group: environment
    plausibleMin: -300
    plausibleMax: 700

  # --- Microelements (U17): the ICP panel ----------------------------------
  # Categories major/trace/contaminant surface on the Microelements screen,
  # not the dashboard. Canonical storage stays ppm (mg/L) for every
  # concentration; display units are fixed per element to match the ICP
  # report (Fauna Marin): mg/L for the macroelement/halogen/nutrient rows
  # (Na, K, S, B, Br, Sr, I, Si), µg/L via displayFactor 1000 for trace
  # elements and contaminants. Strontium, iodine, iron and potassium predate
  # the panel: their keys and stored ppm values are unchanged, they only
  # moved category (iron additionally gained the µg/L display, which is
  # presentation-only).
  #
  # `defaultBounds` are sensible starting points anchored on natural seawater
  # (NSW at 35 ppt: Na ~10 760, K ~400, S ~905, B ~4.4, Br ~65, Sr ~8.1 ppm;
  # I ~60 µg/L, Mo ~10 µg/L, Li ~180 µg/L, Ba ~10–15 µg/L) and the target
  # ranges ICP labs publish — deliberately generous, and editable per tank
  # exactly like core-parameter bounds. `hobbyKit` marks the elements
  # hobbyists test at home between ICPs (Salifert/Red Sea kits exist for
  # these) — the compact filter of the micro entry form.
  - key: strontium
    unit: mg/L
    decimals: 1
    category: trace
    symbol: Sr
    hobbyKit: true
    minValue: 0
    plausibleMin: 0
    plausibleMax: 50
    defaultBounds: { amberLow: 5.5, greenLow: 7.0, greenHigh: 9.5, amberHigh: 12.0 }

  # Iodine sits with the halogens on the report, in mg/L (e.g. 0.102) —
  # three decimals cover the reference-range resolution (0.055–0.080).
  - key: iodine
    unit: mg/L
    decimals: 3
    category: trace
    symbol: I
    hobbyKit: true
    minValue: 0
    plausibleMin: 0
    plausibleMax: 2
    defaultBounds: { amberLow: 0.03, greenLow: 0.05, greenHigh: 0.08, amberHigh: 0.12 }

  - key: iron
    unit: "µg/L"
    decimals: 1
    category: trace
    symbol: Fe
    displayFactor: 1000
    hobbyKit: true
    minValue: 0
    plausibleMin: 0
    plausibleMax: 2
    defaultBounds: { greenHigh: 0.005, amberHigh: 0.015 }

  # Major ions (mg/L on ICP reports; wide tolerances).
  - key: sodium
    unit: mg/L
    decimals: 0
    category: major
    symbol: Na
    minValue: 0
    plausibleMin: 3000
    plausibleMax: 20000
    defaultBounds: { amberLow: 9500, greenLow: 10000, greenHigh: 11200, amberHigh: 12000 }

  # Potassium predates the panel as a core dashboard parameter — key and
  # stored ppm values unchanged, it only moved category (and its label from
  # ppm to the equivalent mg/L).
  - key: potassium
    unit: mg/L
    decimals: 0
    category: major
    symbol: K
    minValue: 0
    plausibleMin: 100
    plausibleMax: 800
    defaultBounds: { amberLow: 340, greenLow: 380, greenHigh: 420, amberHigh: 460 }

  - key: sulfur
    unit: mg/L
    decimals: 0
    category: major
    symbol: S
    minValue: 0
    plausibleMin: 200
    plausibleMax: 2000
    defaultBounds: { amberLow: 780, greenLow: 850, greenHigh: 980, amberHigh: 1100 }

  - key: boron
    unit: mg/L
    decimals: 1
    category: major
    symbol: B
    minValue: 0
    plausibleMin: 0
    plausibleMax: 20
    defaultBounds: { amberLow: 3.0, greenLow: 3.8, greenHigh: 5.5, amberHigh: 7.0 }

  - key: bromine
    unit: mg/L
    decimals: 0
    category: major
    symbol: Br
    minValue: 0
    plausibleMin: 0
    plausibleMax: 300
    defaultBounds: { amberLow: 45, greenLow: 55, greenHigh: 75, amberHigh: 95 }

  # Silicon sits with the majors on ICP reports — in mg/L like them (e.g.
  # 0.2) — but is wanted *low* (diatoms), so its default bounds are
  # one-sided like a contaminant's.
  - key: silicon
    unit: mg/L
    decimals: 2
    category: major
    symbol: Si
    minValue: 0
    plausibleMin: 0
    plausibleMax: 10
    defaultBounds: { greenHigh: 0.15, amberHigh: 0.5 }

  # Desirable trace elements (µg/L range).
  - key: zinc
    unit: "µg/L"
    decimals: 1
    category: trace
    symbol: Zn
    displayFactor: 1000
    minValue: 0
    plausibleMin: 0
    plausibleMax: 1
    defaultBounds: { greenHigh: 0.01, amberHigh: 0.03 }

  - key: vanadium
    unit: "µg/L"
    decimals: 1
    category: trace
    symbol: V
    displayFactor: 1000
    minValue: 0
    plausibleMin: 0
    plausibleMax: 1
    defaultBounds: { greenHigh: 0.003, amberHigh: 0.008 }

  - key: copper
    unit: "µg/L"
