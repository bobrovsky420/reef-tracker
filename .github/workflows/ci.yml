name: CI

# Every push and PR to master runs, in one job: format check, a
# regenerate-and-diff guard for all committed generated sources, analyze, and
# tests with coverage (lcov uploaded as an artifact). A second job builds a
# debug APK so the Android platform layer (Gradle/AGP/Kotlin config, manifest,
# pinned plugins) is exercised too — debug needs no key.properties.
#
# Superseded runs on the same ref are cancelled (concurrency below).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.3
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      # Generated sources (database.g.dart, app_localizations*.dart,
      # parameter_catalog.g.dart, supplement_catalog.g.dart,
      # micro_views.g.dart, pro_features.g.dart, presets.g.dart,
      # ratio.g.dart, ro.g.dart) are committed; regenerate them all and fail
      # on any diff so an ARB/schema/YAML edit can't merge with stale
      # generated code. Order matters: build_runner deletes the catalog
      # .g.dart files (no builder claims them) as conflicting outputs, so
      # the catalog generators must run after it — and gen_parameters before
      # gen_supplements, which imports the parameter catalog to validate
      # element keys (gen_micro_views, gen_pro_features, gen_tank_presets
      # and gen_ro_defaults read the YAML sources directly, so their
      # position is free).
      - name: Check generated code is up to date
        run: |
          flutter gen-l10n
          dart run build_runner build
          dart run tool/gen_parameters.dart
          dart run tool/gen_supplements.dart
          dart run tool/gen_micro_views.dart
          dart run tool/gen_pro_features.dart
          dart run tool/gen_tank_presets.dart
          dart run tool/gen_ro_defaults.dart
          git diff --exit-code
          test -z "$(git ls-files --others --exclude-standard)"

      # Fails on warnings/errors (the project's clean baseline). Not
      # --fatal-infos: some test files carry pre-existing info-level lints.
      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # AGP 9 / Kotlin 2.3 (see the pinned-plugin note in pubspec.yaml); match
      # the JDK 21 used for local release builds instead of the runner default.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.3
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug
